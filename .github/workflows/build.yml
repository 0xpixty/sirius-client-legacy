name: Build Windows Release

on:
  push:
    branches-ignore:
      - gh-readonly-queue/**
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build-windows-release:
    runs-on: windows-latest

    env:
      CARGO_HTTP_MULTIPLEXING: false
      CMAKE_ARGS: -A x64 -DEXCEPTION_HANDLING=ON -DVULKAN=ON -DDISCORD=ON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.296.0
          cache: true

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            src/mastersrv
            src/masterping
            ./

      - name: Build mastersrv
        working-directory: src/mastersrv
        run: cargo build --release

      - name: Build masterping
        working-directory: src/masterping
        run: cargo build --release

      - name: Configure CMake
        run: >
          cmake -S . -B build-release
          ${{ env.CMAKE_ARGS }}
          -DCMAKE_BUILD_TYPE=Release
          -Werror=dev
          -DDOWNLOAD_GTEST=ON
          -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=.

      - name: Build release
        run: cmake --build build-release --config Release --target everything

      - name: Package release
        run: cmake --build build-release --config Release --target package_default

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-release/artifacts | Out-Null
          Get-ChildItem -Path build-release -Filter '*-win64.zip' | Move-Item -Destination build-release/artifacts -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sirius-client-windows-release
          path: build-release/artifacts
          if-no-files-found: error
